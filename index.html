<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>efsane.com — satılık</title>
<meta name="description" content="efsane.com satılıktır. Teklifinizi iletin.">
<meta property="og:title" content="efsane.com satılık">
<meta property="og:description" content="Herkesin bildiği bir kelime. Teklifinizi iletin.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
<style>
  :root {
    --bg: #ffffff;
    --fg: #0d0d0f;
    --muted: #6b6b76;
    --line: #e6e6ea;
    --accent: #1a1a1f;
    --accent-fg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }
  main { max-width: 34rem; width: 100%; }
  .lang {
    position: fixed;
    top: 1.25rem;
    right: 1.25rem;
    display: flex;
    gap: 0.15rem;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.2rem;
    background: var(--bg);
  }
  .lang button {
    font: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--muted);
    background: none;
    border: 0;
    border-radius: 999px;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .lang button:hover { color: var(--fg); }
  .lang button[aria-pressed="true"] {
    background: var(--accent);
    color: var(--accent-fg);
  }
  .lang button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.75rem;
  }
  .eyebrow::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #16a34a;
    margin-right: 0.55rem;
    vertical-align: 0.05em;
  }
  h1 {
    font-size: clamp(2.75rem, 13vw, 6rem);
    line-height: 1.02;
    letter-spacing: -0.045em;
    font-weight: 600;
  }
  h1 .tld { color: var(--muted); font-weight: 400; }
  .tagline {
    font-size: clamp(1.05rem, 3.2vw, 1.25rem);
    color: var(--muted);
    margin: 1.5rem auto 0;
    max-width: 24rem;
    text-wrap: balance;
  }
  .cta {
    display: inline-block;
    margin-top: 2.5rem;
    padding: 0.95rem 2.25rem;
    background: var(--accent);
    color: var(--accent-fg);
    text-decoration: none;
    border-radius: 999px;
    font-weight: 500;
    font-size: 1rem;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .cta:hover { transform: translateY(-2px); opacity: 0.9; }
  .cta:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .cta-note {
    margin-top: 1.25rem;
    font-size: 0.875rem;
    color: var(--muted);
  }
  .cta-note a { color: inherit; text-underline-offset: 2px; }
</style>
</head>
<body>
<nav class="lang" aria-label="Dil / Language">
  <button type="button" data-lang="tr" aria-pressed="true" lang="tr">TR</button>
  <button type="button" data-lang="en" aria-pressed="false" lang="en">EN</button>
</nav>

<main>
  <p class="eyebrow" data-i18n="eyebrow">Satılık alan adı</p>

  <h1>efsane<span class="tld">.com</span></h1>

  <p class="tagline" data-i18n="tagline">Herkesin bildiği bir kelime. Markanız olabilir.</p>

  <a class="cta" data-i18n="cta" href="mailto:hbilis@efsane.com.tr?subject=efsane.com%20i%C3%A7in%20teklif&body=Merhaba%2C%0A%0Aefsane.com%20i%C3%A7in%20teklifim%3A%20%0A%0A">Teklif verin</a>

  <p class="cta-note">
    <span data-i18n="ctaNote">veya</span>
    <a href="mailto:hbilis@efsane.com.tr">hbilis@efsane.com.tr</a>
  </p>
</main>

<script>
(function () {
  var EMAIL = "hbilis@efsane.com.tr";

  var COPY = {
    tr: {
      title: "efsane.com — satılık",
      eyebrow: "Satılık alan adı",
      tagline: "Herkesin bildiği bir kelime. Markanız olabilir.",
      cta: "Teklif verin",
      ctaNote: "veya",
      subject: "efsane.com için teklif",
      body: "Merhaba,\n\nefsane.com için teklifim: \n\n"
    },
    en: {
      title: "efsane.com — for sale",
      eyebrow: "Domain for sale",
      tagline: "Turkish for legend. One word, and the .com.",
      cta: "Make an offer",
      ctaNote: "or",
      subject: "Offer for efsane.com",
      body: "Hi,\n\nMy offer for efsane.com: \n\n"
    }
  };

  var buttons = document.querySelectorAll(".lang button");

  function apply(lang) {
    var t = COPY[lang];
    document.documentElement.lang = lang;
    document.title = t.title;

    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      el.textContent = t[el.dataset.i18n];
    });

    document.querySelector(".cta").href =
      "mailto:" + EMAIL +
      "?subject=" + encodeURIComponent(t.subject) +
      "&body=" + encodeURIComponent(t.body);

    buttons.forEach(function (b) {
      b.setAttribute("aria-pressed", String(b.dataset.lang === lang));
    });

    try { localStorage.setItem("lang", lang); } catch (e) {}
  }

  buttons.forEach(function (b) {
    b.addEventListener("click", function () { apply(b.dataset.lang); });
  });

  var saved;
  try { saved = localStorage.getItem("lang"); } catch (e) {}
  apply(COPY[saved] ? saved : "tr");
})();
</script>
</body>
</html>
